<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <title>FocusBrain</title>
    <!--
      Redirection SPA pour GitHub Pages.
      GitHub Pages sert ce 404.html pour toute route inconnue (ex. /focusbrain/dashboard).
      On encode le chemin dans la query puis on redirige vers index.html, qui le restaure.
      pathSegmentsToKeep = 1 → on garde le préfixe du projet (/focusbrain/).
    -->
    <script type="text/javascript">
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
