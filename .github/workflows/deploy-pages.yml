name: Deploy frontend to GitHub Pages

# Déploie le frontend (vitrine + app) sur GitHub Pages à chaque push sur master.
# ⚠️ L'app a besoin du backend en ligne (Render) : configurez les secrets ci-dessous.
#   Secrets repo à définir (Settings → Secrets and variables → Actions) :
#     VITE_API_URL      = https://<votre-backend>.onrender.com/api
#     VITE_SOCKET_URL   = https://<votre-backend>.onrender.com
#     VITE_MAPTILER_KEY = <votre clé MapTiler>   (optionnel, pour la carte)

on:
  push:
    branches: [master]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Build (base = /focusbrain/)
        run: npm run build -- --base=/focusbrain/
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_SOCKET_URL: ${{ secrets.VITE_SOCKET_URL }}
          VITE_MAPTILER_KEY: ${{ secrets.VITE_MAPTILER_KEY }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
